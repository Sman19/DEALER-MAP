<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BMW Dealers — US + Canada</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100vh; width: 100vw; }

    .controls {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1000;
      background: #fff;
      padding: 8px 10px;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      display: flex;
      gap: 8px;
      align-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    .controls input,
    .controls select {
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    .controls input {
      width: 260px;
    }

    .controls select {
      background: #fff;
      cursor: pointer;
    }

    .controls button,
    .home-btn {
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      cursor: pointer;
      background: #f6f6f6;
      color: #111;
      text-decoration: none;
      font-size: 14px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      display: inline-block;
    }

    .controls button:hover,
    .home-btn:hover { background: #eee; }

    .legend {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 1000;
      background: #fff;
      padding: 8px 10px;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      font-size: 13px;
      line-height: 1.35;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    .tooltip-title {
      font-weight: 700;
      margin-bottom: 4px;
      font-size: 18px;
    }

    .popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .copy-btn {
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #f6f6f6;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }

    .copy-btn:hover { background: #eee; }
    .count { font-weight: 600; }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="controls">
    <a href="https://sman19.github.io/Active-Website/index.html" class="home-btn" title="Go to Home">Home</a>

    <input id="search" type="text" placeholder="Search dealer / state / country / phone…" />

    <select id="countryFilter" title="Filter by country">
      <option value="">All</option>
      <option value="US">U.S.</option>
      <option value="Canada">Canada</option>
    </select>

    <button id="resetBtn" title="Reset view">Reset</button>
    <span id="shownCount"></span>
  </div>

  <div class="legend">
    <div><span class="count" id="totalCount">0</span> BMW dealers loaded</div>
    <div>• Click a marker to see details</div>
    <div>• Data file: <code>bmw_dealers.csv</code></div>
  </div>

  <script>
    let map;
    let activeInfoWindow = null;

    const allMarkers = [];
    const allPoints = [];

    const searchInput = document.getElementById('search');
    const countryFilter = document.getElementById('countryFilter');
    const shownCount = document.getElementById('shownCount');
    const totalCount = document.getElementById('totalCount');

    const esc = (s) => String(s ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');

    function copyFromButton(btn) {
      const text = btn.getAttribute('data-copy') || '';
      const prev = btn.textContent;
      btn.disabled = true;

      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        setTimeout(() => {
          btn.textContent = prev;
          btn.disabled = false;
        }, 1200);
      }).catch(() => {
        btn.textContent = 'Failed';
        setTimeout(() => {
          btn.textContent = prev;
          btn.disabled = false;
        }, 1200);
      });
    }

    window.copyFromButton = copyFromButton;

    function makePopupHtml(name, street, city, state, country, zip, phone, code, url) {
      const copyText = `${name}
${street}
${city}, ${state}
${country}
${phone}
${zip}`;

      return `
        <div style="font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; min-width:250px;">
          <div class="popup-header">
            <div class="tooltip-title">${esc(name)}</div>
            <button class="copy-btn" data-copy="${esc(copyText)}" onclick="copyFromButton(this)">Copy Address</button>
          </div>
          <div>${esc(street)}</div>
          <div>${esc(city)}, ${esc(state)}</div>
          <div><b>Country:</b> ${esc(country)}</div>
          <div><b>Phone:</b> ${esc(phone)} &nbsp;&nbsp; <b>Zip:</b> ${esc(zip)}</div>
          <div><b>Dealer Code:</b> ${esc(code)}</div>
          ${url ? `<div style="margin-top:6px;"><a href="${esc(url)}" target="_blank" rel="noopener">Visit Website</a></div>` : ''}
        </div>
      `;
    }

    function createMarker(record) {
      const marker = new google.maps.Marker({
        position: { lat: record.lat, lng: record.lng },
        map,
        title: record.name
      });

      const infoWindow = new google.maps.InfoWindow({
        content: makePopupHtml(
          record.name,
          record.street,
          record.city,
          record.state,
          record.country,
          record.zip,
          record.phone,
          record.code,
          record.url
        )
      });

      marker.addListener("click", () => {
        if (activeInfoWindow) activeInfoWindow.close();
        activeInfoWindow = infoWindow;
        infoWindow.open(map, marker);
      });

      marker.meta = {
        name: (record.name || '').toLowerCase(),
        state: (record.state || '').toLowerCase(),
        country: (record.country || '').toLowerCase(),
        code: (record.code || '').toLowerCase(),
        phone: (record.phone || '').toLowerCase()
      };

      marker.raw = record;
      allMarkers.push(marker);
      allPoints.push(marker.getPosition());
    }

    function getVisibleMarkers(filterText = '') {
      const f = (filterText || '').trim().toLowerCase();
      const selectedCountry = (countryFilter.value || '').toLowerCase();

      return allMarkers.filter(marker => {
        const matchesSearch =
          !f ||
          marker.meta.name.includes(f) ||
          marker.meta.state.includes(f) ||
          marker.meta.country.includes(f) ||
          marker.meta.code.includes(f) ||
          marker.meta.phone.includes(f);

        const matchesCountry =
          !selectedCountry || marker.meta.country === selectedCountry;

        return matchesSearch && matchesCountry;
      });
    }

    function fitToMarkers(markers) {
      if (!markers.length) return;

      const bounds = new google.maps.LatLngBounds();
      markers.forEach(marker => bounds.extend(marker.getPosition()));

      map.fitBounds(bounds);

      google.maps.event.addListenerOnce(map, "bounds_changed", () => {
        if (map.getZoom() > 10) map.setZoom(10);
      });
    }

    function renderMarkers(filterText = '') {
      const visibleMarkers = getVisibleMarkers(filterText);

      allMarkers.forEach(marker => marker.setMap(null));
      visibleMarkers.forEach(marker => marker.setMap(map));

      shownCount.textContent = `${visibleMarkers.length} shown`;
      totalCount.textContent = allMarkers.length;

      if (visibleMarkers.length > 0) {
        fitToMarkers(visibleMarkers);
      }
    }

    function loadDealers() {
      Papa.parse("bmw_dealers.csv", {
        download: true,
        header: true,
        skipEmptyLines: true,

        complete: function(results) {
          results.data.forEach(function(r) {
            const name    = (r.name || '').trim();
            const state   = (r.state || '').trim();
            const country = (r.country || '').trim();
            const code    = (r.dealer_code || '').trim();
            const phone   = (r.phone || '').trim();
            const street  = (r.street || '').trim();
            const city    = (r.city || '').trim();
            const zip     = (r.zip || '').trim();
            const lat     = parseFloat(r.lat);
            const lng     = parseFloat(r.lng);
            const url     = (r.url || '').trim();

            if (name && !isNaN(lat) && !isNaN(lng)) {
              createMarker({
                name,
                state,
                country,
                code,
                phone,
                street,
                city,
                zip,
                lat,
                lng,
                url
              });
            }
          });

          totalCount.textContent = allMarkers.length;
          renderMarkers();

          if (allMarkers.length) {
            fitToMarkers(allMarkers);
          }
        },

        error: function(err) {
          console.error("CSV load error:", err);
        }
      });
    }

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 39.5, lng: -98.35 },
        zoom: 3.5,
        mapTypeControl: true,
        streetViewControl: false,
        fullscreenControl: true
      });

      loadDealers();
    }

    window.initMap = initMap;

    searchInput.addEventListener('input', function(e) {
      renderMarkers(e.target.value);
    });

    countryFilter.addEventListener('change', function() {
      renderMarkers(searchInput.value);
    });

    document.getElementById('resetBtn').addEventListener('click', function() {
      searchInput.value = '';
      countryFilter.value = '';
      renderMarkers();

      if (allMarkers.length) {
        fitToMarkers(allMarkers);
      }
    });
  </script>

  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB6wmsZHv6hoIzkt5eIcm5NVVqxQHoThcA&callback=initMap">
  </script>
</body>
</html>
